title: 快速配置启动器
url: 本站的 Yggdrasil API 认证服务器地址：
tip: 点击下方按钮复制 API 地址，或者将按钮拖动至启动器的任意界面即可快速添加认证服务器。手动设置教程：
tip2: HMCL 启动器设置：点击左上角 [账户]，点左下角 [添加认证服务器]，输入上方认证服务器地址
tip3: PCL 启动器设置：[启动游戏] ⟶ 下方 [版本设置] ⟶ 左侧 [设置] ⟶ 页面下方 [服务器选项]，输入上方认证服务器地址
tip4: 提醒：对于服主和玩家，如果您使用 Java 7 或 Java 8，请确保您的 Java 8 >= 8u141，Java 7 >= 7u151，否则无法连接到联合认证。
button: 将此按钮拖动至启动器
guide: 启动器配置教程
